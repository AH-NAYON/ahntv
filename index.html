<style>
:root {
  --primary:#E50914;--primary-h:#c2070f;--primary-glow:rgba(229,9,20,.3);
  --bg:#08080a;--bg-panel:#111114;--bg-card:#18181d;--bg-el:#1f1f26;
  --txt:#f5f5f5;--txt-m:#888896;--txt-d:#555560;
  --bdr:rgba(255,255,255,.07);--bdr-h:rgba(255,255,255,.12);
  --nav-bg:rgba(8,8,10,.94);
  --card-shadow:0 2px 6px rgba(0,0,0,.35);--card-hover-shadow:0 6px 16px rgba(0,0,0,.45);
  --panel-shadow:0 1px 8px rgba(0,0,0,.25);--toast-shadow:0 6px 18px rgba(0,0,0,.4);
  --nav-shadow:0 1px 16px rgba(0,0,0,.6);--overlay-bg:rgba(0,0,0,.55);
  --input-bg:rgba(255,255,255,.05);--input-focus-bg:rgba(255,255,255,.08);
  --btn-bg:rgba(255,255,255,.04);--tab-hover-bg:rgba(255,255,255,.05);
  --cnt-bg:rgba(255,255,255,.07);--active-cnt-bg:rgba(255,255,255,.2);
  --url-hls-bg:#1a3a1a;--url-hls-color:#4ade80;
  --url-yt-bg:#1a1a2e;--url-yt-color:#ff6b6b;
  --url-embed-bg:#1a1a3a;--url-embed-color:#60a5fa;
  --logo-bg:#0d0d10;--thumb-bg:#111;--np-logo-bg:#111;
  --np-type-bg:rgba(255,255,255,.08);--buf-bg:rgba(0,0,0,.7);--buf-txt-color:#fff;
  --spinner-border:rgba(255,255,255,.1);
  --skeleton-base:rgba(255,255,255,.035);--skeleton-shine:rgba(255,255,255,.08);
  --empty-color:var(--txt-m);
}
body.light {
  --bg:#f4f5f7;--bg-panel:#fafbfc;--bg-card:#fff;--bg-el:#f0f2f5;
  --txt:#1a1a2e;--txt-m:#555566;--txt-d:#9a9aad;
  --bdr:rgba(0,0,0,.05);--bdr-h:rgba(0,0,0,.08);
  --nav-bg:rgba(250,251,252,.9);
  --card-shadow:0 1px 4px rgba(0,0,0,.03);--card-hover-shadow:0 4px 14px rgba(0,0,0,.05);
  --panel-shadow:0 1px 6px rgba(0,0,0,.02);--toast-shadow:0 4px 14px rgba(0,0,0,.04);
  --nav-shadow:0 1px 4px rgba(0,0,0,.02);--overlay-bg:rgba(0,0,0,.35);
  --input-bg:var(--bg-el);--input-focus-bg:var(--bg-panel);--btn-bg:var(--bg-el);
  --tab-hover-bg:rgba(0,0,0,.02);--cnt-bg:rgba(0,0,0,.04);--active-cnt-bg:rgba(255,255,255,.2);
  --url-hls-bg:#dcfce7;--url-hls-color:#166534;
  --url-yt-bg:#fee2e2;--url-yt-color:#991b1b;
  --url-embed-bg:#dbeafe;--url-embed-color:#1e40af;
  --logo-bg:var(--bg-el);--thumb-bg:var(--bg-el);--np-logo-bg:var(--bg-el);
  --np-type-bg:rgba(0,0,0,.04);--buf-bg:rgba(250,251,252,.9);--buf-txt-color:var(--txt);
  --spinner-border:rgba(0,0,0,.08);
  --skeleton-base:rgba(0,0,0,.02);--skeleton-shine:rgba(0,0,0,.05);
  --empty-color:var(--txt-m);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--txt);overflow-x:hidden;-webkit-font-smoothing:antialiased;text-rendering:optimizeSpeed}
.bn{font-family:'Hind Siliguri',sans-serif}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--primary);border-radius:10px}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes livebeat{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.35);opacity:.55}}
@keyframes shimmer{0%{background-position:-300px 0}100%{background-position:300px 0}}
@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(229,9,20,.4)}70%{box-shadow:0 0 0 10px rgba(229,9,20,0)}100%{box-shadow:0 0 0 0 rgba(229,9,20,0)}}
.fade-up{animation:fadeUp .3s ease both}
.skeleton{background:linear-gradient(90deg,var(--skeleton-base) 25%,var(--skeleton-shine) 50%,var(--skeleton-base) 75%);background-size:300px 100%;animation:shimmer 1.2s infinite;border-radius:8px}

.navbar{position:fixed;top:0;left:0;right:0;height:56px;background:var(--nav-bg);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;padding:0 14px;z-index:10000;box-shadow:var(--nav-shadow)}
.brand{display:flex;align-items:center;gap:7px;font-size:17px;font-weight:800;color:var(--primary);letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.brand .logo-icon{font-size:22px;filter:drop-shadow(0 0 6px var(--primary))}
.brand-sub{font-size:8px;color:var(--txt-m);font-weight:400;letter-spacing:2px;text-transform:uppercase;display:block;line-height:1;margin-top:1px}
.nav-center{flex:1;max-width:320px;margin:0 16px;position:relative}
.nav-center input{width:100%;background:var(--input-bg);border:1px solid var(--bdr);color:var(--txt);padding:7px 12px 7px 32px;border-radius:18px;font-size:12.5px;outline:none;transition:border .2s,background .2s;font-family:'Poppins',sans-serif}
.nav-center input:focus{border-color:var(--primary);background:var(--input-focus-bg);box-shadow:0 0 0 3px rgba(229,9,20,.1)}
.nav-center input::placeholder{color:var(--txt-d)}
.nav-center .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txt-d);font-size:11px}
.nav-actions{display:flex;align-items:center;gap:5px}
.nav-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--bdr);background:var(--btn-bg);color:var(--txt-m);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:background .15s,color .15s,transform .15s;position:relative}
.nav-btn:hover{background:var(--primary);border-color:var(--primary);color:#fff;transform:scale(1.06)}
.badge{position:absolute;top:-2px;right:-2px;background:var(--primary);color:#fff;font-size:7px;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;border:2px solid var(--bg)}
.menu-btn{display:none}
.install-header-btn{background:var(--primary);color:#fff;border:none;padding:6px 13px;border-radius:30px;font-size:10.5px;font-weight:600;cursor:pointer;transition:background .15s,transform .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;box-shadow:0 2px 8px var(--primary-glow);animation:pulse-ring 2.2s ease infinite}
.install-header-btn:hover{background:var(--primary-h);transform:scale(1.06)}
.install-header-btn i{font-size:10px}

.overlay{position:fixed;top:56px;left:0;right:0;bottom:0;background:var(--overlay-bg);z-index:9998;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:auto}

.layout{display:flex;margin-top:56px;min-height:calc(100vh - 56px)}

.sidebar{width:210px;flex-shrink:0;background:var(--bg-panel);border-right:1px solid var(--bdr);position:fixed;top:56px;bottom:0;left:0;overflow-y:auto;padding:12px 8px;transition:left .25s;z-index:9999;-webkit-overflow-scrolling:touch}
.sidebar-label{font-size:9px;text-transform:uppercase;color:var(--txt-d);letter-spacing:1.5px;font-weight:600;padding:3px 8px 6px}
.group-tab{display:flex;align-items:center;gap:9px;width:100%;padding:8px 10px;border-radius:7px;border:none;background:transparent;color:var(--txt-m);font-size:12px;font-weight:500;cursor:pointer;transition:background .15s,color .15s;text-align:left;margin-bottom:1px;font-family:'Poppins',sans-serif}
.group-tab i{width:15px;text-align:center;font-size:12px}
.group-tab .cnt{margin-left:auto;font-size:8px;background:var(--cnt-bg);padding:2px 5px;border-radius:16px;color:var(--txt-d)}
.group-tab:hover{background:var(--tab-hover-bg);color:var(--txt)}
.group-tab.active{background:var(--primary);color:#fff;box-shadow:0 3px 10px var(--primary-glow)}
.group-tab.active .cnt{background:var(--active-cnt-bg);color:#fff}

.main{flex:1;margin-left:210px;padding:14px;max-width:100%}

.player-wrap{position:relative;background:#000;border-radius:11px;overflow:hidden;border:1px solid var(--bdr);box-shadow:0 3px 18px rgba(0,0,0,.25);aspect-ratio:16/9;margin-bottom:16px}
.player-top-grad{position:absolute;top:0;left:0;right:0;height:55px;background:linear-gradient(to bottom,rgba(0,0,0,.75),transparent);z-index:20;pointer-events:none}
.player-bot-grad{position:absolute;bottom:0;left:0;right:0;height:70px;background:linear-gradient(to top,rgba(0,0,0,.8),transparent);z-index:20;pointer-events:none}
.now-bar{position:absolute;top:0;left:0;right:0;padding:10px 14px;display:flex;align-items:center;gap:7px;z-index:21;opacity:0;transition:opacity .25s}
.player-wrap:hover .now-bar,.player-wrap.ui-on .now-bar{opacity:1}
.live-dot{width:6px;height:6px;background:#ff3b30;border-radius:50%;animation:livebeat 1.4s ease infinite;flex-shrink:0}
.live-lbl{font-size:8px;font-weight:700;letter-spacing:1.5px;color:#ff3b30;text-transform:uppercase}
.now-name{font-size:11px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.buffering{position:absolute;inset:0;background:var(--buf-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:30;opacity:0;pointer-events:none;transition:opacity .2s}
.buffering.show{opacity:1;pointer-events:auto}
.spinner{width:36px;height:36px;border:3px solid var(--spinner-border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
.buf-txt{font-size:12px;font-weight:600;color:var(--buf-txt-color);font-family:'Hind Siliguri',sans-serif;text-align:center;padding:0 16px}
video{width:100%;height:100%;object-fit:contain;background:#000;display:block}
.video-zoom-container{position:absolute;inset:0;overflow:hidden;z-index:15}
iframe.embed-player{width:100%;height:100%;border:none;display:block;background:#000;position:absolute;inset:0;z-index:10}

.pcontrols{position:absolute;bottom:0;left:0;right:0;padding:0 14px 12px;z-index:25;display:flex;flex-direction:column;gap:6px;opacity:0;transition:opacity .25s;pointer-events:none}
.player-wrap:hover .pcontrols,.player-wrap.ui-on .pcontrols{opacity:1;pointer-events:auto}
.prog-live{width:100%;height:2.5px;background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--primary);width:100%;border-radius:2px}
.ctrl-row{display:flex;align-items:center;justify-content:space-between}
.ctrl-l,.ctrl-r{display:flex;align-items:center;gap:5px}
.ctrl-btn{width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,.1);color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,transform .15s}
.ctrl-btn:hover{background:rgba(255,255,255,.2);transform:scale(1.07)}
.ctrl-btn.pri{background:var(--primary);width:38px;height:38px;font-size:14px;box-shadow:0 0 10px var(--primary-glow)}
.ctrl-btn.pri:hover{background:var(--primary-h)}
.vol-sl{width:55px;height:3px;accent-color:var(--primary);cursor:pointer}
.ch-info{font-size:10px;color:rgba(255,255,255,.65);font-weight:500}
.ch-info span{color:#fff;font-weight:700}
.zoom-controls{display:none;align-items:center;gap:3px}
.player-wrap.fullscreen-active .zoom-controls{display:flex}
.zoom-controls .ctrl-btn{width:26px;height:26px;font-size:10px}
.player-wrap:fullscreen,.player-wrap:-webkit-full-screen{aspect-ratio:unset;border-radius:0;max-height:100vh}

.np-card{background:var(--bg-el);border-radius:9px;padding:12px 14px;border:1px solid var(--bdr);margin-bottom:14px;display:flex;align-items:center;gap:12px}
.np-logo{width:46px;height:46px;border-radius:6px;background:var(--np-logo-bg);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.np-logo img{max-width:100%;max-height:100%;object-fit:contain}
.np-info{flex:1;min-width:0}
.np-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-meta{font-size:10px;color:var(--txt-m);margin-top:2px;display:flex;align-items:center;gap:6px}
.np-badge{background:var(--primary);color:#fff;font-size:7px;font-weight:700;padding:2px 4px;border-radius:3px;letter-spacing:1px;text-transform:uppercase;animation:livebeat 2s ease infinite}
.np-type-badge{background:var(--np-type-bg);color:var(--txt-m);font-size:7px;font-weight:600;padding:2px 4px;border-radius:3px;letter-spacing:.5px;text-transform:uppercase}

.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{display:flex;align-items:center;gap:7px;font-size:15px;font-weight:700}
.sec-title::before{content:'';width:3px;height:16px;background:var(--primary);border-radius:2px;display:block}
.ch-count{font-size:10px;color:var(--txt-m);background:var(--cnt-bg);padding:2px 8px;border-radius:16px}
.channel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;padding-bottom:36px}
.ch-card{background:var(--bg-card);border-radius:9px;overflow:hidden;cursor:pointer;border:1px solid transparent;transition:transform .18s,box-shadow .18s,border-color .18s;position:relative;display:flex;flex-direction:column;box-shadow:var(--card-shadow);content-visibility:auto;contain-intrinsic-size:auto 140px}
.ch-card:hover{transform:translateY(-2px);box-shadow:var(--card-hover-shadow);border-color:var(--bdr-h)}
.ch-card.active{border-color:var(--primary);box-shadow:0 0 0 1px var(--primary),0 6px 16px rgba(229,9,20,.15)}
.ch-card.active::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--primary)}
.card-thumb{height:72px;background:var(--thumb-bg);display:flex;align-items:center;justify-content:center;padding:10px;overflow:hidden;position:relative}
.card-thumb img{max-width:100%;max-height:100%;object-fit:contain;transition:transform .2s}
.ch-card:hover .card-thumb img{transform:scale(1.04)}
.play-ov{position:absolute;inset:0;background:rgba(229,9,20,.78);opacity:0;display:flex;align-items:center;justify-content:center;transition:opacity .18s}
.ch-card:hover .play-ov{opacity:1}
.play-ov i{font-size:18px;color:#fff}
.url-type{position:absolute;bottom:3px;left:3px;font-size:6px;font-weight:700;padding:1px 3px;border-radius:2px;letter-spacing:.4px;text-transform:uppercase;opacity:.8}
.url-type.hls{background:var(--url-hls-bg);color:var(--url-hls-color)}
.url-type.yt{background:var(--url-yt-bg);color:var(--url-yt-color)}
.url-type.embed{background:var(--url-embed-bg);color:var(--url-embed-color)}
.card-body{padding:7px 9px 8px}
.card-name{font-size:10.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt);margin-bottom:2px}
.card-grp{font-size:8.5px;color:var(--txt-m);text-transform:uppercase;letter-spacing:.3px}
.fav-btn{position:absolute;top:5px;right:5px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.45);border:none;color:rgba(255,255,255,.75);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;transition:transform .15s,color .15s;z-index:5}
.fav-btn:hover{transform:scale(1.12);color:#fff}
.fav-btn.on{color:var(--primary)}

.install-banner{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--bg-panel);border:1px solid var(--bdr-h);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:10px;z-index:99999;box-shadow:0 10px 32px rgba(0,0,0,.35),0 0 0 1px rgba(229,9,20,.12);max-width:480px;width:calc(100% - 28px);transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .25s;opacity:0;pointer-events:none}
.install-banner.show{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:auto;animation:pulse-ring 2s ease infinite}
.install-banner .ib-icon{width:40px;height:40px;border-radius:10px;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0;box-shadow:0 3px 12px var(--primary-glow)}
.install-banner .ib-text{flex:1;min-width:0}
.install-banner .ib-title{font-size:12px;font-weight:700;color:var(--txt);font-family:'Hind Siliguri',sans-serif}
.install-banner .ib-sub{font-size:9px;color:var(--txt-m);margin-top:1px}
.install-banner .ib-btns{display:flex;gap:6px;flex-shrink:0}
.install-banner .ib-install{background:var(--primary);color:#fff;border:none;padding:8px 14px;border-radius:9px;font-weight:700;font-size:11px;cursor:pointer;font-family:'Hind Siliguri',sans-serif;transition:background .15s,transform .15s;white-space:nowrap;box-shadow:0 3px 10px var(--primary-glow)}
.install-banner .ib-install:hover{background:var(--primary-h);transform:scale(1.04)}
.install-banner .ib-close{width:28px;height:28px;border-radius:50%;border:1px solid var(--bdr);background:var(--btn-bg);color:var(--txt-m);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0}
.install-banner .ib-close:hover{background:var(--tab-hover-bg);color:var(--txt)}

.empty{grid-column:1/-1;text-align:center;padding:45px 16px;color:var(--empty-color)}
.empty i{font-size:40px;margin-bottom:8px;opacity:.25;display:block}
.empty p{font-size:12px}

.toast-c{position:fixed;top:68px;right:14px;z-index:99999;display:flex;flex-direction:column;gap:6px}
.toast{background:var(--bg-el);border:1px solid var(--bdr);border-radius:8px;padding:9px 14px;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--txt);box-shadow:var(--toast-shadow);animation:fadeUp .25s ease;max-width:240px}
.toast i{color:var(--primary);font-size:12px}
@keyframes toastOut{to{opacity:0;transform:translateX(16px)}}
.toast.hide{animation:toastOut .25s ease forwards}

.footer{background:var(--bg-panel);border:1px solid var(--bdr);border-radius:10px;padding:20px;text-align:center;margin-bottom:12px;box-shadow:var(--panel-shadow)}
.footer-verified{display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:6px;color:var(--primary);font-weight:600;font-size:13px}
.footer-verified i{font-size:15px;filter:drop-shadow(0 0 4px rgba(229,9,20,.3))}
.footer-contact-text{font-size:12px;color:var(--txt-m);margin-bottom:10px}
.contact-icons{display:flex;justify-content:center;gap:12px;margin-bottom:10px}

// ═══════════════════════════════════════════
// STATE & DOM
// ═══════════════════════════════════════════
let channels=[],view=[],curIdx=0,curGroup='All';
let favs=JSON.parse(localStorage.getItem('ptv_favs')||'[]');
let hls=null,uiTimer=null,sTimer=null,searchDebounce=null,currentZoom=1;
const $={};
function cacheDom(){
  $.pw=document.getElementById('playerWrap');$.v=document.getElementById('video');
  $.ps=document.getElementById('playerSkeleton');$.bf=document.getElementById('buffering');
  $.bt=document.getElementById('bufTxt');$.nbn=document.getElementById('npBarName');
  $.nt=document.getElementById('npTitle');$.ng=document.getElementById('npGroup');
  $.ntb=document.getElementById('npTypeBadge');$.nl=document.getElementById('npLogo');
  $.nc=document.getElementById('npCard');$.ci=document.getElementById('chIdx');
  $.ct=document.getElementById('chTot');$.cg=document.getElementById('channelGrid');
  $.st=document.getElementById('secTitle');$.cc=document.getElementById('chCount');
  $.pb=document.getElementById('playBtn');$.mb=document.getElementById('muteBtn');
  $.vs=document.getElementById('volSl');$.fs=document.getElementById('fsBtn');
  $.ds=document.getElementById('desktopSearch');$.ms=document.getElementById('mobileSearch');
  $.gt=document.getElementById('groupTabs');$.fb=document.getElementById('favBadge');
  $.tc=document.getElementById('toastC');$.sh=document.getElementById('sHint');
  $.tb=document.getElementById('topBtn');$.sb=document.getElementById('sidebar');
  $.ov=document.getElementById('overlay');$.ib=document.getElementById('installBanner');
  $.ihb=document.getElementById('installHeaderBtn');$.thb=document.getElementById('themeBtn');
}
cacheDom();

function getUrlType(url){
  if(!url)return'embed';const u=url.trim().toLowerCase();
  if(u.includes('.m3u8')||u.includes('.m3u'))return'hls';
  if(u.includes('youtube.com')||u.includes('youtu.be'))return'youtube';
  return'embed';
}
function urlTypeBadgeLabel(url){const t=getUrlType(url);if(t==='hls')return'HLS';if(t==='youtube')return'YouTube';return'Embed';}
function urlTypeClass(url){const t=getUrlType(url);if(t==='hls')return'hls';if(t==='youtube')return'yt';return'embed';}

const EMBED_RULES=[
  {re:/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]+)/,fn:m=>`https://www.youtube.com/embed/${m[1]}?autoplay=1&rel=0`},
  {re:/youtube\.com\/live\/([\w-]+)/,fn:m=>`https://www.youtube.com/embed/${m[1]}?autoplay=1&rel=0`},
  {re:/\/embed\//i,fn:(_,url)=>url},
];
function getEmbedUrl(url){for(const r of EMBED_RULES){const m=url.match(r.re);if(m)return r.fn(m,url);}return url;}

// ═══════════════════════════════════════════
// INIT — EMBEDDED DATA (NO API FETCH)
// ═══════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  initTheme();
  channels = EMBEDDED_CHANNELS;
  buildSidebar();
  applyFilter('All','');
  $.ps.style.display='none';
  $.nc.style.display='flex';
  if(channels.length){playCh(0,false);toast(channels.length+' টি চ্যানেল রেডি ⚡','fa-circle-check');}
  else{toast('কোনো চ্যানেল নেই','fa-triangle-exclamation');}
  setupVideoEvents();
  setupPlayerUI();
  setupKeys();
  updateFavBadge();
  if(!isAppInstalled()){$.ihb.style.display='inline-flex';}
});

function normGroup(g){
  g=(g||'').toLowerCase().trim();
  if(['bangla','bangladesh','indian bangla','inbangla','bd','deshe bideshe','deshi tv'].includes(g))return'Bangla';
  if(g.includes('sport')||g.includes('cricket')||g.includes('football'))return'Sports';
  if(g.includes('news'))return'News';
  if(g.includes('movie'))return'Movies';
  if(g.includes('music'))return'Music';
  if(g.includes('kid')||g.includes('cartoon'))return'Kids';
  if(['english','hindi','urdhu','urdu','arabic','indian'].some(x=>g.includes(x))&&!g.includes('bangla'))return'International';
  if(g.includes('hindi'))return'Hindi';
  if(g.includes('english'))return'English';
  if(g.includes('indian bangla'))return'Indian Bangla';
  if(['entertainment','drama','series'].some(x=>g.includes(x)))return'Entertainment';
  if(g.includes('religious')||g.includes('islam'))return'Religious';
  if(g.includes('documentary'))return'Documentary';
  if(g.includes('weather'))return'Weather';
  return'Others';
}

function buildSidebar(){
  const gc={};
  channels.forEach(c=>{const g=normGroup(c.group);gc[g]=(gc[g]||0)+1;});
  gc['All']=channels.length;gc['Favorites']=favs.length;
  $.gt.innerHTML=GROUPS.map(g=>`<button class="group-tab${g.name==='All'?' active':''}" onclick="filterGroup('${g.name}',this)"><i class="fas ${g.icon}"></i><span>${g.name}</span><span class="cnt">${gc[g.name]||0}</span></button>`).join('');
}

function filterGroup(group,btn){
  curGroup=group;
  document.querySelectorAll('.group-tab').forEach(e=>e.classList.remove('active'));
  if(btn)btn.classList.add('active');
  else document.querySelectorAll('.group-tab').forEach(e=>{if(e.textContent.includes(group))e.classList.add('active');});
  $.ds.value='';$.ms.value='';applyFilter(group,'');
  if(window.innerWidth<=900)toggleSidebar(true);
}

function applyFilter(group,q){
  let list=channels;
  if(group==='Favorites')list=channels.filter(c=>favs.includes(c.url));
  else if(group!=='All')list=channels.filter(c=>normGroup(c.group)===group);
  if(q)list=list.filter(c=>c.name.toLowerCase().includes(q.toLowerCase()));
  view=list;
  $.st.innerHTML=group==='Favorites'?'<i class="fas fa-heart" style="color:var(--primary)"></i> Favorites':group+' Channels';
  $.cc.textContent=list.length+' চ্যানেল';renderGrid();
}

function onSearch(q){if(searchDebounce)clearTimeout(searchDebounce);searchDebounce=setTimeout(()=>{$.ds.value=q;$.ms.value=q;applyFilter(curGroup,q);},150);}
function esc(u){return u.replace(/'/g,"\\'").replace(/"/g,'"');}

function renderGrid(){
  $.cg.className='channel-grid fade-up';void $.cg.offsetWidth;
  if(!view.length){$.cg.innerHTML='<div class="empty"><i class="fas fa-tv"></i><p class="bn">কোনো চ্যানেল পাওয়া যায়নি</p></div>';return;}
  const curUrl=channels[curIdx]?.url;
  $.cg.innerHTML=view.map(ch=>{
    const isFav=favs.includes(ch.url),isAct=ch.url===curUrl;
    const uType=urlTypeClass(ch.url),uLabel=urlTypeBadgeLabel(ch.url);
    return `<div class="ch-card${isAct?' active':''}" onclick="clickCard('${esc(ch.url)}')" role="button" tabindex="0" aria-label="${ch.name}">
      <button class="fav-btn${isFav?' on':''}" onclick="toggleFav(event,'${esc(ch.url)}')" title="Favorite"><i class="${isFav?'fas':'far'} fa-heart"></i></button>
      <div class="card-thumb"><img src="${ch.logo||'https://placehold.co/200x100/111/444?text=TV'}" onerror="this.src='https://placehold.co/200x100/111/444?text=TV'" loading="lazy" alt="${ch.name}"><div class="play-ov"><i class="fas fa-play"></i></div><span class="url-type ${uType}">${uLabel}</span></div>
      <div class="card-body"><div class="card-name">${ch.name}</div><div class="card-grp">${ch.group||'—'}</div></div>
    </div>`;
  }).join('');
}

function clickCard(url){const idx=channels.findIndex(c=>c.url===url);if(idx!==-1)playCh(idx,true);}

function playCh(index,scrollTop=false){
  if(index<0||index>=channels.length)return;
  curIdx=index;const ch=channels[index];
  showBuf('সার্ভারের সাথে কানেক্ট হচ্ছে...');
  if(hls){hls.destroy();hls=null;}
  $.pw.querySelectorAll('iframe.embed-player').forEach(f=>f.remove());
  $.v.style.display='block';$.v.src='';$.v.style.transform='scale(1)';currentZoom=1;
  const url=ch.url.trim(),type=getUrlType(url);
  if(type==='hls'){
    if(typeof Hls!=='undefined'&&Hls.isSupported()){hls=new Hls({enableWorker:true,lowLatencyMode:true,backBufferLength:90});hls.loadSource(url);hls.attachMedia($.v);hls.on(Hls.Events.MANIFEST_PARSED,()=>{$.v.play().catch(()=>{});updatePlayIcon();});hls.on(Hls.Events.ERROR,(e,d)=>{if(d.fatal){showBuf('ভিডিও লোড হতে সমস্যা হচ্ছে ⚠️');setTimeout(hideBuf,3000);}});}
    else if($.v.canPlayType('application/vnd.apple.mpegurl')){$.v.src=url;$.v.play().catch(()=>{});updatePlayIcon();}
    else{showBuf('এই ব্রাউজারে HLS সাপোর্ট নেই ⚠️');setTimeout(hideBuf,2500);}
  }else{const eu=getEmbedUrl(url);$.v.style.display='none';const ifr=document.createElement('iframe');ifr.className='embed-player';ifr.src=eu;ifr.allow='autoplay;fullscreen;encrypted-media;picture-in-picture';ifr.allowFullscreen=true;$.pw.insertBefore(ifr,$.pw.querySelector('.player-top-grad'));setTimeout(hideBuf,1800);}
  $.nbn.textContent=ch.name;$.nt.textContent=ch.name;$.ng.textContent=ch.group||'—';$.ntb.textContent=urlTypeBadgeLabel(url);
  $.nl.src=ch.logo||'https://placehold.co/52x52/111/444?text=TV';$.nl.onerror=()=>{$.nl.src='https://placehold.co/52x52/111/444?text=TV';};
  $.ci.textContent=index+1;$.ct.textContent=channels.length;renderGrid();
  if(scrollTop&&window.innerWidth<=900)window.scrollTo({top:0,behavior:'smooth'});
}
function togglePlay(){if($.v.style.display==='none')return;$.v.paused?$.v.play():$.v.pause();updatePlayIcon();}
function updatePlayIcon(){$.pb.innerHTML=`<i class="fas ${$.v.paused?'fa-play':'fa-pause'}"></i>`;}
function nextCh(){playCh((curIdx+1)%channels.length,false);}
function prevCh(){playCh((curIdx-1+channels.length)%channels.length,false);}
function toggleMute(){$.v.muted=!$.v.muted;$.mb.innerHTML=`<i class="fas ${$.v.muted?'fa-volume-xmark':'fa-volume-high'}"></i>`;}
function setVol(val){$.v.volume=parseFloat(val);$.v.muted=false;$.mb.innerHTML=`<i class="fas ${val==0?'fa-volume-xmark':'fa-volume-high'}"></i>`;}

function zoomVideo(step){if(!document.fullscreenElement&&!document.webkitFullscreenElement){toast('জুম শুধু ফুলস্ক্রিনে কাজ করে','fa-info-circle');return;}currentZoom=Math.min(3,Math.max(0.5,currentZoom+step));if($.v.style.display!=='none')$.v.style.transform=`scale(${currentZoom})`;const ifr=document.querySelector('iframe.embed-player');if(ifr)ifr.style.transform=`scale(${currentZoom})`;}
function toggleLandscape(){
  if(!document.fullscreenElement&&!document.webkitFullscreenElement){const rfs=$.pw.requestFullscreen||$.pw.webkitRequestFullscreen;if(rfs){rfs.call($.pw).then(()=>{if(screen.orientation&&screen.orientation.lock)screen.orientation.lock('landscape').catch(()=>{});$.fs.innerHTML='<i class="fas fa-compress"></i>';$.pw.classList.add('fullscreen-active');currentZoom=1;$.v.style.transform='scale(1)';}).catch(()=>toast('ফুলস্ক্রিন করা যায়নি','fa-triangle-exclamation'));}}
  else{if(document.exitFullscreen){document.exitFullscreen();$.fs.innerHTML='<i class="fas fa-expand"></i>';$.pw.classList.remove('fullscreen-active');currentZoom=1;$.v.style.transform='scale(1)';}}
}
document.addEventListener('fullscreenchange',()=>{if(!document.fullscreenElement){$.pw.classList.remove('fullscreen-active');$.fs.innerHTML='<i class="fas fa-expand"></i>';currentZoom=1;$.v.style.transform='scale(1)';}});

async function togglePiP(){if($.v.style.display==='none'){toast('Embed চ্যানেলে PiP সাপোর্ট নেই','fa-triangle-exclamation');return;}try{if(document.pictureInPictureElement)await document.exitPictureInPicture();else if(document.pictureInPictureEnabled){await $.v.requestPictureInPicture();toast('Picture-in-Picture সক্রিয়','fa-clone');}}catch(e){toast('PiP সাপোর্টেড না','fa-triangle-exclamation');}}

function toggleFav(e,url){e.stopPropagation();if(favs.includes(url)){favs=favs.filter(x=>x!==url);toast('Favorites থেকে সরানো হয়েছে','fa-heart-crack');}else{favs.push(url);toast('Favorites এ যোগ করা হয়েছে','fa-heart');}localStorage.setItem('ptv_favs',JSON.stringify(favs));updateFavBadge();buildSidebar();if(curGroup==='Favorites')applyFilter('Favorites','');else renderGrid();}
function updateFavBadge(){$.fb.style.display=favs.length?'flex':'none';$.fb.textContent=favs.length>9?'9+':favs.length;}

function setupVideoEvents(){$.v.addEventListener('playing',()=>{hideBuf();updatePlayIcon();});$.v.addEventListener('waiting',()=>showBuf('বাফার হচ্ছে...'));$.v.addEventListener('pause',updatePlayIcon);$.v.addEventListener('volumechange',()=>{$.vs.value=$.v.muted?0:$.v.volume;});$.v.addEventListener('error',()=>{showBuf('স্ট্রিম লোড হয়নি ⚠️');setTimeout(hideBuf,3000);});}
function showBuf(msg){$.bt.textContent=msg;$.bf.classList.add('show');}
function hideBuf(){$.bf.classList.remove('show');}

function setupPlayerUI(){function showUI(){$.pw.classList.add('ui-on');clearTimeout(uiTimer);uiTimer=setTimeout(()=>{if(!$.v.paused)$.pw.classList.remove('ui-on');},2800);}$.pw.addEventListener('mousemove',showUI);$.pw.addEventListener('touchstart',showUI,{passive:true});$.v.addEventListener('pause',()=>$.pw.classList.add('ui-on'));$.v.addEventListener('play',showUI);}

function setupKeys(){document.addEventListener('keydown',e=>{if(['INPUT','TEXTAREA'].includes(e.target.tagName))return;let h='';switch(e.key){case' ':case'k':e.preventDefault();togglePlay();h='Play/Pause';break;case'ArrowRight':nextCh();h='Next→';break;case'ArrowLeft':prevCh();h='Prev←';break;case'm':case'M':toggleMute();h='Mute';break;case'f':case'F':toggleLandscape();h='Fullscreen';break;case'p':case'P':togglePiP();h='PiP';break;case'ArrowUp':$.v.volume=Math.min(1,$.v.volume+0.1);$.vs.value=$.v.volume;h='Vol+';break;case'ArrowDown':$.v.volume=Math.max(0,$.v.volume-0.1);$.vs.value=$.v.volume;h='Vol−';break;}if(h)showHint(h);});}
function showHint(t){$.sh.textContent=t;$.sh.classList.add('show');clearTimeout(sTimer);sTimer=setTimeout(()=>$.sh.classList.remove('show'),1400);}

function toggleSidebar(forceClose=false){if(forceClose){$.sb.classList.remove('open');$.ov.classList.remove('show');}else{$.sb.classList.toggle('open');$.ov.classList.toggle('show');}}

function toast(msg,icon='fa-circle-check'){const t=document.createElement('div');t.className='toast';t.innerHTML=`<i class="fas ${icon}"></i><span>${msg}</span>`;$.tc.appendChild(t);setTimeout(()=>{t.classList.add('hide');setTimeout(()=>t.remove(),250);},2200);}

function initTheme(){const s=localStorage.getItem('ptv_theme');if(s==='dark')applyLight(false);else applyLight(true);}
function toggleTheme(){applyLight(!document.body.classList.contains('light'));}
function applyLight(on){if(on){document.body.classList.add('light');$.thb.innerHTML='<i class="fas fa-moon"></i>';$.thb.title='Dark mode';localStorage.setItem('ptv_theme','light');}else{document.body.classList.remove('light');$.thb.innerHTML='<i class="fas fa-sun"></i>';$.thb.title='Light mode';localStorage.setItem('ptv_theme','dark');}}
window.addEventListener('scroll',()=>{$.tb.style.display=scrollY>400?'block':'none';},{passive:true});
</script>
</body></html>
